syntax = "proto3";

package kadepay.v1.services.invoice;

service InvoiceService {
    rpc CreateInvoice(NewInvoiceRequest) returns (NewInvoiceResponse) {}
}

message NewInvoiceRequest {
    string x_pub_key_id = 1;
    string chain = 2;
    string network = 3;
    string currency_code = 4;
    string amount = 5;
    string description = 6;
}

message NewInvoiceResponse {
    string id = 1;
    string x_pub_key_id = 2;
    string chain = 3;
    string network = 4;
    string currency_code = 5;
    string amount = 6;
    string address = 7;
    int64 created_at = 8;
    string description = 9;
    string status = 10;
}
