syntax = "proto3";

package kadepay.v1.services.invoice;

service InvoiceService {
    rpc CreateInvoice(NewInvoiceRequest) returns (NewInvoiceResponse) {}
}

message NewInvoiceRequest {
    string pub_key_id = 1;
    string network = 2;
    string currency_code = 3;
    string amount = 4;
    string description = 5;
}

message NewInvoiceResponse {
    string id = 1;
    string pub_key_id = 2;
    string network = 3;
    string currency_code = 4;
    string amount = 5;
    string address = 6;
    int64 created_at = 7;
    string description = 8;
    string status = 9;
}
