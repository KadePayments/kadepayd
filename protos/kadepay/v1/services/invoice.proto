syntax = "proto3";

package kadepay.v1.services.invoice;

service InvoiceService {
    rpc CreateInvoice(NewInvoiceRequest) returns (InvoiceResponse) {}

    rpc GetInvoices(InvoiceResponse) returns (GetInvoicesResponse) {}
}

message NewInvoiceRequest {
    string x_pub_key_id = 1;
    string chain = 2;
    string network = 3;
    string currency_code = 4;
    string amount = 5;
    string description = 6;
}

message InvoiceResponse {
    string id = 1;
    string x_pub_key_id = 2;
    string chain = 3;
    string network = 4;
    string currency_code = 5;
    string amount = 6;
    string address = 7;
    int64 created_at = 8;
    string description = 9;
    string status = 10;
    int32 child_key_index = 11;
}

message GetInvoicesRequest {
    string x_pub_key_id = 1;
}

message GetInvoicesResponse {
    repeated InvoiceResponse invoices = 1;
}