syntax = "proto3";

package kadepay.v1.services.invoice;

service InvoiceService {
    rpc CreateInvoice(NewInvoiceRequest) returns (NewInvoiceResponse) {}
}

message NewInvoiceRequest {
    string network = 1;
    string currency_code = 2;
    double amount = 3;
    string description = 4;
}

message NewInvoiceResponse {
    string id = 1;
    string network = 2;
    string currency_code = 3;
    double amount = 4;
    string address = 5;
    int64 created_at = 6;
    string description = 7;
    string status = 8;
}
