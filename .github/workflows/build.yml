name: kadepayd CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    needs:
      - tests
      - check-format

    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: sudo apt-get install protobuf-compiler
      - uses: actions/checkout@v6
      - name: Build
        run: cargo build

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get install protobuf-compiler
      - uses: actions/checkout@v6
      - name: Tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test

  check-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check code style
        run: cargo fmt --check
